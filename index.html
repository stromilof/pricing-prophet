// ─── SIMPLE MARKDOWN RENDERER ────────────────────────────
function renderMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  // Wrap remaining lines in <p>
  html = html.split('\n').map(line => {
    if (line.match(/^<(h[123]|ul|ol|li|blockquote)/)) return line;
    if (line.trim() === '') return '';
    return `<p>${line}</p>`;
  }).join('\n');

  return html;
}

// ─── API CALL ─────────────────────────────────────────────
async function generateAudit(data) {
  const ai = new GoogleGenAI({ apiKey: API_KEY });

  const validCompetitors = data.competitorUrls.filter(u => u.length > 5);
  const hasCompetitors = validCompetitors.length > 0;

  const systemInstruction = `
    You are an expert Pricing Consultant known for ruthless efficiency and clarity.
    Your mandate is to audit a B2B SaaS pricing page based ONLY on the visible content of the specific URL provided, AND any competitor URLs explicitly provided.
    
    CRITICAL RULE: "TABULA RASA" (BLANK SLATE)
    - You must pretend you have NO prior knowledge of the company, brand, or its products.
    - If a feature or price is not explicitly mentioned on the provided pages, it DOES NOT EXIST.
    - Do not fill in gaps with your training data.
  `;

  const prompt = `
    Analyze the pricing page for this company: ${data.url}.
    
    Context:
    - Target Customer: ${data.targetCustomer}
    - Primary Objective: ${data.objective}
    ${hasCompetitors ? `- Competitor Comparison URLs: ${validCompetitors.join(', ')}` : ''}

    Task:
    Perform a high-impact pricing and packaging audit based EXCLUSIVELY on the content found at the provided URL(s).

    WRITING RULES (STRICT ADHERENCE REQUIRED):
    - **Brevity**: Omit needless words. Keep paragraphs under 3 sentences.
    - **Scannability**: Use bullet points for >70% of the content. Use **bold** to highlight key insights within sentences.
    - **Active Voice**: Use strong verbs. Be direct.
    - **Judgment**: Every section must contain an opinion, not just a description.

    Required Output Sections (Use Markdown H2 headers):
    
    ## 1. Executive Verdict
    * Provide a 2-sentence "Buy/Sell/Hold" style judgment on their current pricing effectiveness.
    * Give it a letter grade (A-F) based on clarity and monetization power.

    ## 2. Critical Red Flags (Revenue Leaks)
    * List the top 3-4 specific issues that are likely losing them money right now.
    * Be specific (e.g., "Hidden pricing scares away SMBs").

    ## 3. Structural Audit (The Mechanics)
    * **Value Metric**: Is it aligned with usage? (Verdict: Strong/Weak)
    * **Packaging**: Is the distinction between tiers logical? (Verdict: Strong/Weak)
    * **Upsell Path**: Is the path to higher NRR clear? (Verdict: Strong/Weak)

    ${hasCompetitors ? '## 4. Competitor Battlecard\n* Direct comparison vs provided URLs. Who wins on value? Who wins on clarity? Use a "Winner/Loser" format.' : ''}
    ${data.includeExperiment ? '## 5. The Growth Experiment\n* **Hypothesis**: "If we..."\n* **Test Design**: How to validate it.\n* **Impact**: Expected lift.' : ''}
    
    ## ${hasCompetitors || data.includeExperiment ? '6' : '4'}. Action Plan (3 Steps)
    * Three prioritized, high-impact changes to make immediately.
    * Start each bullet with a verb.

    Constraint:
    - Use Google Search ONLY to retrieve the content of this specific URL${hasCompetitors ? ' AND the competitor URLs' : ''}.
    - DO NOT look for other external reviews or news.
    - Your analysis must be grounded solely in what is presented on the page(s) provided.
  `;

  const response = await ai.models.generateContent({
    model: 'gemini-2.0-flash',
    contents: prompt,
    config: {
      systemInstruction,
      tools: [{ googleSearch: {} }],
      thinkingConfig: { thinkingBudget: 8192 },
    }
  });

  const markdown = response.text || "No analysis generated.";
  const groundingChunks = response.candidates?.[0]?.groundingMetadata?.groundingChunks || [];
  const sourceUrls = [...new Set(groundingChunks.map(c => c.web?.uri).filter(Boolean))];

  return { markdown, sourceUrls };
}

            ),
            React.createElement('h1', { className: 'text-2xl md:text-3xl font-bold mb-2' }, 'Pricing Strategy Audit'),
