function renderMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  html = html.split('\n').map(line => {
    if (line.match(/^<(h[123]|ul|ol|li|blockquote)/)) return line;
    if (line.trim() === '') return '';
    return `<p>${line}</p>`;
  }).join('\n');
  return html;
}

async function generateAudit(data) {
  const ai = new GoogleGenAI({ apiKey: API_KEY });
  const validCompetitors = data.competitorUrls.filter(u => u.length > 5);
  const hasCompetitors = validCompetitors.length > 0;

  const systemInstruction = `You are an expert Pricing Consultant known for ruthless efficiency and clarity.
    Your mandate is to audit a B2B SaaS pricing page based ONLY on the visible content of the specific URL provided.
    CRITICAL RULE: Pretend you have NO prior knowledge of the company. If a feature or price is not explicitly mentioned, it DOES NOT EXIST.`;

  const prompt = `Analyze the pricing page: ${data.url}.
    Context: Target Customer: ${data.targetCustomer}, Objective: ${data.objective}
    ${hasCompetitors ? `Competitor URLs: ${validCompetitors.join(', ')}` : ''}

    Perform a high-impact pricing audit. Use bullet points for 70%+ of content. Be direct and opinionated.

    ## 1. Executive Verdict
    * 2-sentence Buy/Sell/Hold judgment. Give a letter grade (A-F).

    ## 2. Critical Red Flags (Revenue Leaks)
    * Top 3-4 specific issues losing them money right now.

    ## 3. Structural Audit
    * **Value Metric**: aligned with usage? (Strong/Weak)
    * **Packaging**: tier distinction logical? (Strong/Weak)
    * **Upsell Path**: path to higher NRR clear? (Strong/Weak)

    ${hasCompetitors ? '## 4. Competitor Battlecard\n* Winner/Loser format vs provided URLs.' : ''}
    ${data.includeExperiment ? '## 5. Growth Experiment\n* Hypothesis, Test Design, Expected Impact.' : ''}

    ## ${hasCompetitors || data.includeExperiment ? '6' : '4'}. Action Plan (3 Steps)
    * Three prioritized changes. Start each with a verb.

    Use Google Search ONLY to retrieve the content of the provided URL(s).`;

  const response = await ai.models.generateContent({
    model: 'gemini-2.0-flash-lite',
    contents: prompt,
    config: {
      systemInstruction,
      tools: [{ googleSearch: {} }],
    }
  });

  const markdown = response.text || "No analysis generated.";
  const groundingChunks = response.candidates?.[0]?.groundingMetadata?.groundingChunks || [];
  const sourceUrls = [...new Set(groundingChunks.map(c => c.web?.uri).filter(Boolean))];
  return { markdown, sourceUrls };
}
